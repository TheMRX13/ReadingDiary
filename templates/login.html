<!DOCTYPE html>
<html lang="de" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading Diary – Login</title>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#3b82f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Reading Diary">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
    }
    .login-card {
      background: rgba(30,41,59,.9);
      border: 1px solid rgba(59,130,246,.2);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px rgba(0,0,0,.4);
      backdrop-filter: blur(12px);
    }
    .login-logo {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #3b82f6, #818cf8);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; color: #fff;
      margin: 0 auto 20px;
      box-shadow: 0 8px 20px rgba(59,130,246,.3);
    }
    .login-title { color: #fff; font-weight: 800; font-size: 1.6rem; text-align: center; }
    .login-subtitle { color: #94a3b8; font-size: .875rem; text-align: center; margin-bottom: 32px; }
    .form-control-login {
      background: rgba(15,23,42,.8);
      border: 1px solid rgba(59,130,246,.25);
      color: #e2e8f0;
      border-radius: 10px;
      padding: 12px 16px 12px 44px;
      font-size: .95rem;
    }
    .form-control-login:focus {
      background: rgba(15,23,42,.9);
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,.15);
      color: #e2e8f0;
    }
    .pw-wrap { position: relative; }
    .pw-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #60a5fa; }
    .pw-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #94a3b8; background: none; border: none; cursor: pointer; }
    .btn-login {
      background: linear-gradient(135deg, #3b82f6, #818cf8);
      border: none; color: #fff; font-weight: 700;
      border-radius: 10px; padding: 12px;
      font-size: 1rem; width: 100%;
      transition: opacity .2s;
    }
    .btn-login:hover { opacity: .9; color: #fff; }
    .error-msg { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: #f87171;
      border-radius: 10px; padding: 10px 14px; font-size: .875rem; margin-bottom: 16px; }
    @media (max-width: 480px) { .login-card { padding: 32px 24px; margin: 12px; } }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo"><i class="fas fa-book-open"></i></div>
  <div class="login-title">Reading Diary</div>
  <div class="login-subtitle">{{ _('Your personal reading diary') }}</div>

  {% if error %}
  <div class="error-msg"><i class="fas fa-exclamation-circle me-2"></i>{{ error }}</div>
  {% endif %}

  <form method="post">
    <div class="mb-4">
      <label class="form-label" style="color:#94a3b8;font-size:.8rem;font-weight:600">{{ _('PASSWORD') }}</label>
      <div class="pw-wrap">
        <i class="fas fa-lock pw-icon"></i>
        <input type="password" name="password" id="pw" class="form-control form-control-login"
               placeholder="{{ _('Enter password') }}" autofocus autocomplete="current-password">
        <button type="button" class="pw-toggle" onclick="togglePW()">
          <i class="fas fa-eye" id="pw-eye"></i>
        </button>
      </div>
    </div>
    <button type="submit" class="btn btn-login">
      <i class="fas fa-sign-in-alt me-2"></i>{{ _('Log in') }}
    </button>
  </form>
  <div style="text-align:center;margin-top:24px">
    <a href="https://github.com/TheMRX13/ReadingDiary" target="_blank" rel="noopener"
       style="color:#64748b;font-size:.78rem;text-decoration:none;display:inline-flex;align-items:center;gap:6px">
      <i class="fab fa-github" style="font-size:1rem"></i>Coded by TheMRX
    </a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function togglePW() {
    const inp = document.getElementById('pw');
    const ico = document.getElementById('pw-eye');
    if (inp.type === 'password') { inp.type = 'text'; ico.className = 'fas fa-eye-slash'; }
    else { inp.type = 'password'; ico.className = 'fas fa-eye'; }
  }
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js').catch(() => {});
  }
</script>
</body>
</html>
