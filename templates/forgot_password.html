<!DOCTYPE html>
<html lang="de" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ _('Passwort vergessen') }} – Reading Diary</title>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#3b82f6">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
    }
    .forgot-card {
      background: rgba(30,41,59,.9); border: 1px solid rgba(59,130,246,.2);
      border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 420px;
      box-shadow: 0 25px 50px rgba(0,0,0,.4); backdrop-filter: blur(12px);
    }
    .forgot-logo {
      width: 64px; height: 64px; background: linear-gradient(135deg, #3b82f6, #818cf8);
      border-radius: 18px; display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; color: #fff; margin: 0 auto 20px;
      box-shadow: 0 8px 20px rgba(59,130,246,.3);
    }
    .forgot-title    { color: #fff; font-weight: 800; font-size: 1.6rem; text-align: center; }
    .forgot-subtitle { color: #94a3b8; font-size: .875rem; text-align: center; margin-bottom: 32px; }
    .field-wrap { position: relative; }
    .field-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #60a5fa; }
    .form-control-forgot {
      background: rgba(15,23,42,.8); border: 1px solid rgba(59,130,246,.25);
      color: #e2e8f0; border-radius: 10px; padding: 12px 16px 12px 44px; font-size: .95rem;
    }
    .form-control-forgot:focus {
      background: rgba(15,23,42,.9); border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,.15); color: #e2e8f0;
    }
    .btn-forgot {
      background: linear-gradient(135deg, #3b82f6, #818cf8); border: none; color: #fff;
      font-weight: 700; border-radius: 10px; padding: 12px; font-size: 1rem;
      width: 100%; transition: opacity .2s;
    }
    .btn-forgot:hover { opacity: .9; color: #fff; }
    .success-msg {
      background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.3); color: #4ade80;
      border-radius: 10px; padding: 14px; font-size: .875rem; margin-bottom: 16px;
    }
    .divider { border-color: rgba(59,130,246,.15); margin: 24px 0; }
    @media (max-width: 480px) { .forgot-card { padding: 32px 24px; margin: 12px; } }
  </style>
</head>
<body>
<div class="forgot-card">
  <div class="forgot-logo"><i class="fas fa-key"></i></div>
  <div class="forgot-title">{{ _('Passwort vergessen?') }}</div>
  <div class="forgot-subtitle">{{ _('Wir helfen dir, es zurückzusetzen') }}</div>

  {% if success %}
  <div class="success-msg">
    <i class="fas fa-check-circle me-2"></i>{{ _('Falls ein Account mit dieser E-Mail oder diesem Benutzernamen existiert, erhältst du bald einen Reset-Link.') }}
  </div>
  {% endif %}

  <form method="post" action="/forgot-password">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="mb-4">
      <label class="form-label" style="color:#94a3b8;font-size:.8rem;font-weight:600">{{ _('BENUTZERNAME ODER E-MAIL') }}</label>
      <div class="field-wrap">
        <i class="fas fa-user field-icon"></i>
        <input type="text" name="identifier" class="form-control form-control-forgot"
               placeholder="{{ _('Benutzername oder E-Mail') }}" autofocus required>
      </div>
    </div>

    <button type="submit" class="btn btn-forgot">
      <i class="fas fa-paper-plane me-2"></i>{{ _('Reset-Link senden') }}
    </button>
  </form>

  <hr class="divider">
  <div style="text-align:center;">
    <a href="{{ url_for('login') }}" style="color:#3b82f6;text-decoration:none;font-size:.88rem;font-weight:600;">
      <i class="fas fa-arrow-left me-1"></i>{{ _('Zurück zum Login') }}
    </a>
  </div>

  <!-- Sprachumschalter -->
  <div style="display:flex;justify-content:center;gap:8px;margin-top:20px;">
    <a href="/set-lang/de"
       style="display:flex;align-items:center;gap:5px;font-size:.8rem;text-decoration:none;padding:5px 12px;border-radius:8px;border:1px solid {{ 'rgba(59,130,246,.5)' if session.get('language','de')=='de' else 'rgba(255,255,255,.1)' }};background:{{ 'rgba(59,130,246,.15)' if session.get('language','de')=='de' else 'transparent' }};color:#94a3b8;">
      🇩🇪 DE
    </a>
    <a href="/set-lang/en"
       style="display:flex;align-items:center;gap:5px;font-size:.8rem;text-decoration:none;padding:5px 12px;border-radius:8px;border:1px solid {{ 'rgba(59,130,246,.5)' if session.get('language')=='en' else 'rgba(255,255,255,.1)' }};background:{{ 'rgba(59,130,246,.15)' if session.get('language')=='en' else 'transparent' }};color:#94a3b8;">
      🇬🇧 EN
    </a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js').catch(() => {});
  }
</script>
</body>
</html>
