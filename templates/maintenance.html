<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wartung – Reading Diary</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
    .card { background: #1e293b; border-radius: 20px; padding: 3rem 2.5rem; max-width: 480px; width: 100%; box-shadow: 0 24px 48px rgba(0,0,0,.5); text-align: center; }
    .icon { font-size: 4rem; color: #f59e0b; margin-bottom: 1.5rem; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.5; } }
    h1 { color: #f1f5f9; font-size: 1.8rem; font-weight: 700; margin-bottom: .75rem; }
    p { color: #94a3b8; font-size: 1rem; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon"><i class="fas fa-tools"></i></div>
    <h1>Wartungsarbeiten</h1>
    <p>Reading Diary wird gerade aktualisiert und verbessert.<br>Wir sind gleich wieder für dich da!</p>
    <p style="margin-top:1.5rem;font-size:.85rem;color:#64748b;"><i class="fas fa-clock me-1"></i>Bitte versuche es in Kürze erneut.</p>
    <div style="display:flex;justify-content:center;gap:6px;margin-top:1.5rem;">
      {%- set _lang = session.get('language', 'de') %}
      <a href="/set-lang/de" style="font-size:.78rem;font-weight:600;text-decoration:none;padding:4px 10px;border-radius:7px;border:1px solid {{ 'rgba(59,130,246,.55)' if _lang=='de' else 'rgba(255,255,255,.08)' }};background:{{ 'rgba(59,130,246,.18)' if _lang=='de' else 'transparent' }};color:{{ '#60a5fa' if _lang=='de' else '#64748b' }};">&#127465;&#127466; DE</a>
      <a href="/set-lang/en" style="font-size:.78rem;font-weight:600;text-decoration:none;padding:4px 10px;border-radius:7px;border:1px solid {{ 'rgba(59,130,246,.55)' if _lang=='en' else 'rgba(255,255,255,.08)' }};background:{{ 'rgba(59,130,246,.18)' if _lang=='en' else 'transparent' }};color:{{ '#60a5fa' if _lang=='en' else '#64748b' }};">&#127468;&#127463; EN</a>
    </div>
  </div>
</body>
</html>
